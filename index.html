<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover, shrink-to-fit=no">
    <title>Pharma 1000</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="loader-shell">
        <div class="loader-content">
            <div class="spin"></div>
            <h2>PHARMA 1000</h2>
        </div>
    </div>

    <nav class="navbar">
        <div class="logo-container" onclick="showPage('home')">
            <img id="site-logo" src="https://lh3.googleusercontent.com/d/1Fsjnz7niting6IxQmdvx5uAw1COBqJDb" alt="Logo">
            <span id="site-title">Pharma 1000</span>
        </div>
        <div class="nav-icons-group">
            <div class="icon-btn theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></div>
            <div class="icon-btn" onclick="showPage('search')"><i class="fas fa-search"></i></div>
            <div id="fav-btn-nav" class="icon-btn" onclick="showPage('favorites')">
                <i class="fas fa-heart"></i><span id="fav-count" class="badge">0</span>
            </div>
            <div id="cart-btn-nav" class="icon-btn" onclick="showPage('checkout')">
                <i class="fas fa-shopping-cart"></i><span id="cart-count" class="badge">0</span>
            </div>
        </div>
    </nav>

    <div id="app">
        <div id="home-page" class="page"></div>
        <div id="category-page" class="page" style="display:none"></div>
        <div id="product-page" class="page" style="display:none"></div>
        <div id="checkout-page" class="page" style="display:none"></div>
        <div id="favorites-page" class="page" style="display:none"></div>
        <div id="search-page" class="page" style="display:none"></div>
        <div id="success-page" class="page" style="display:none"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
